<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Avanzado - Programación Web</title>
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- 1. Biblioteca para el selector de emojis(Emoji Mart) -->
    <script src="https://cdn.jsdelivr.net/npm/emoji-mart@latest/dist/browser.js"></script>
    
    <!-- 2. Carga de la librería cliente de Socket.IO -->
    <script src="/socket.io/socket.io.js" defer></script>
    
    <!-- 3. Archivo JavaScript del cliente -->
    <script src="js/client.js" defer></script>
</head>
<body>
    <div class="app-container">
        
        <!-- Pantalla de Login / Autenticación Básica y Selección de Sala (Req 4 y 5) -->
        <div id="auth-container" class="card">
            <h2>Acceso al Chat</h2>
            <form id="login-form">
                <input type="text" id="username" placeholder="Ingresa tu nombre de usuario" required>
                    <select id="room-select">
                        <option value="Taberna del Dragón (General)"> Taberna del Dragón (General)</option>
                        <option value="Sala de Rol D&D">⚔️ Sala: Pathfinder</option>
                        <option value="Mesa de Estrategia"> Mesa de Estrategia</option>
                        <option value="Creación de Personajes"> Creación de Personajes</option>
                    </select>
                <button type="submit">Ingresar</button>
            </form>
        </div>

        <!-- Interfaz Principal del Chat (Se quita la clase hidden tras el ingreso) -->
        <div id="chat-container" class="card hidden">
            <header class="chat-header">
                <h3 id="current-room-title">Sala: </h3>
                <!-- Requerimiento 8: Buscador en el historial local -->
                <input type="text" id="search-input" placeholder="🔍 Buscar en el historial...">
            </header>

            <!-- Contenedor del historial de mensajes (Soporta Req 9: Scroll Infinito) -->
            <div id="chat-messages" class="messages-display">
                <!-- Los mensajes y notificaciones se inyectan dinámicamente mediante JS -->
            </div>

            <footer class="chat-footer">
                <!-- Ventana emergente donde JS renderizará el panel de emojis (Req 6) -->
                <div id="emoji-picker-container" class="hidden"></div>

                <!-- Formulario de Entrada de Mensajes y Adjuntos (Req 6) -->
                <form id="message-form">
                    <!-- Botón para alternar la ventana de emojis -->
                    <button type="button" id="emoji-btn">😀</button>
                    
                    <input type="text" id="msg-text" placeholder="Escribe tu mensaje aquí..." autocomplete="off">
                    
                    <!-- Botón personalizado para adjuntar archivos (Req 6) -->
                    <label for="file-input" class="file-label">📎</label>
                    <input type="file" id="file-input" style="display:none;">
                    
                    <button type="submit">Enviar</button>
                </form>
            </footer>
        </div>

    </div>
</body>
</html>
